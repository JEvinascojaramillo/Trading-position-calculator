<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Risk Calc | Juan Vinasco</title>
    <style>
        /* DARK MODE UI (EXCHANGE STYLE) */
        body { 
            background: #0b0e11; 
            color: #eaecef; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card { 
            background: #1e2329; 
            padding: 25px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
        }
        h2 { text-align: center; color: #f0b90b; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #848e9c; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; 
            padding: 12px; 
            background: #2b3139; 
            border: 1px solid #474d57; 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { border-color: #f0b90b; outline: none; }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #f0b90b; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #d9a508; }
        .results { 
            margin-top: 20px; 
            padding: 15px; 
            background: #2b3139; 
            border-radius: 8px; 
            font-size: 14px; 
            line-height: 1.8;
            border-left: 4px solid #f0b90b;
        }
        .highlight { color: #f0b90b; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #474d57; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 Risk Calculator</h2>
    
    <div class="input-group">
        <label>Account Capital (USD)</label>
        <input type="number" id="capital" value="100000" placeholder="e.g. 200000">
    </div>

    <div class="input-group">
        <label>Risk per Trade (%)</label>
        <input type="number" id="risk" value="1" step="0.1">
    </div>

    <div class="input-group">
        <label>Entry Price</label>
        <input type="number" id="entry" value="65000">
    </div>

    <div class="input-group">
        <label>Stop Loss</label>
        <input type="number" id="stop" value="64200">
    </div>

    <div class="input-group">
        <label>R/R Ratio (e.g. 3 for 1:3)</label>
        <input type="number" id="ratio" value="3">
    </div>

    <button onclick="updateUI()">CALCULATE TRADE</button>

    <div id="display" class="results">
        <p style="text-align: center; color: #848e9c;">Enter data and press calculate</p>
    </div>
</div>

<script>
    /**
     * Position Calculation Logic
     * Developed by Juan Esteban Vinasco
     */
    function updateUI() {
        const capital = parseFloat(document.getElementById('capital').value);
        const riskPercent = parseFloat(document.getElementById('risk').value);
        const entry = parseFloat(document.getElementById('entry').value);
        const stop = parseFloat(document.getElementById('stop').value);
        const rrRatio = parseFloat(document.getElementById('ratio').value);

        // Safety validation
        if (entry === stop) {
            alert("Error: Entry price and Stop Loss cannot be the same.");
            return;
        }

        // 1. Money at risk
        const moneyAtRisk = capital * (riskPercent / 100);
        
        // 2. Distance to Stop
        const stopDistance = Math.abs(entry - stop);
        
        // 3. Position Size (Units)
        const positionSize = moneyAtRisk / stopDistance;

        // 4. Long/Short logic and Take Profit
        const isLong = entry > stop;
        const profitDistance = stopDistance * rrRatio;
        const takeProfit = isLong ? (entry + profitDistance) : (entry - profitDistance);

        // 5. Render results to HTML
        const display = document.getElementById('display');
        display.innerHTML = `
            <p>Order Type: <span class="highlight">${isLong ? 'LONG 🟢' : 'SHORT 🔴'}</span></p>
            <p>Cash at Risk: <span class="highlight">$${moneyAtRisk.toLocaleString()}</span></p>
            <p>Suggested Size: <span class="highlight">${positionSize.toFixed(4)} units</span></p>
            <hr>
            <p>🎯 Take Profit: <span style="color: #02c076; font-weight: bold;">${takeProfit.toFixed(2)}</span></p>
            <p>🛑 Stop Loss: <span style="color: #f84960; font-weight: bold;">${stop.toFixed(2)}</span></p>
            <p>Potential Gain: <span style="color: #02c076; font-weight: bold;">$${(moneyAtRisk * rrRatio).toLocaleString()}</span></p>
        `;
    }
</script>

</body>
</html>
